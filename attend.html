<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الحضور</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
}

.card {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 48px 40px;
  max-width: 340px;
  width: 90%;
}

/* حالة: جاري التحقق */
.state { display: none; }
.state.active { display: block; }

/* أيقونة النجاح */
.icon-wrap {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  margin: 0 auto 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.icon-wrap.success {
  background: rgba(48, 209, 88, 0.12);
  border: 1.5px solid rgba(48, 209, 88, 0.3);
}

.icon-wrap.error {
  background: rgba(255, 69, 58, 0.12);
  border: 1.5px solid rgba(255, 69, 58, 0.3);
}

.icon-wrap.loading {
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: rgba(255,255,255,0.6);
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.checkmark {
  width: 36px;
  height: 36px;
  stroke: #30d158;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  stroke-dasharray: 60;
  stroke-dashoffset: 60;
  animation: draw 0.5s ease forwards 0.1s;
}

@keyframes draw { to { stroke-dashoffset: 0; } }

.xmark {
  width: 32px;
  height: 32px;
  stroke: #ff453a;
  stroke-width: 3;
  stroke-linecap: round;
  fill: none;
}

.main-text {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 10px;
}

.main-text.green { color: #30d158; }
.main-text.red { color: #ff453a; }
.main-text.white { color: #fff; }

.sub-text {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
  line-height: 1.6;
  margin-bottom: 28px;
}

/* بطاقة البيانات */
.info-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 24px;
  text-align: right;
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.info-row:last-child { border-bottom: none; }

.info-label { font-size: 12px; color: rgba(255,255,255,0.35); }
.info-value { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}
.badge.in { background: rgba(48,209,88,0.12); color: #30d158; border: 1px solid rgba(48,209,88,0.2); }
.badge.out { background: rgba(255,69,58,0.12); color: #ff453a; border: 1px solid rgba(255,69,58,0.2); }

/* زر الإغلاق */
.close-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.close-btn:hover { background: rgba(255,255,255,0.1); }

/* عداد الإغلاق */
.auto-close {
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  margin-top: 16px;
}

.countdown-ring {
  display: inline-block;
  width: 16px;
  height: 16px;
  vertical-align: middle;
  margin-left: 4px;
}
</style>
</head>
<body>
<div class="card">

  <!-- حالة: جاري التحقق -->
  <div class="state active" id="state-loading">
    <div class="icon-wrap loading" style="width:48px;height:48px;margin-bottom:20px"></div>
    <div class="main-text white" style="font-size:17px">جاري التحقق...</div>
  </div>

  <!-- حالة: تم التسجيل -->
  <div class="state" id="state-success">
    <div class="icon-wrap success">
      <svg class="checkmark" viewBox="0 0 36 36">
        <polyline points="6,18 14,26 30,10"/>
      </svg>
    </div>
    <div class="main-text green">تم تسجيل الحضور</div>
    <div class="sub-text" id="success-sub">تم التسجيل بنجاح</div>

    <div class="info-card">
      <div class="info-row">
        <div class="info-value" id="info-name">—</div>
        <div class="info-label">الاسم</div>
      </div>
      <div class="info-row">
        <div class="info-value" id="info-type"></div>
        <div class="info-label">النوع</div>
      </div>
      <div class="info-row">
        <div class="info-value" id="info-time">—</div>
        <div class="info-label">الوقت</div>
      </div>
      <div class="info-row">
        <div class="info-value" id="info-date">—</div>
        <div class="info-label">التاريخ</div>
      </div>
    </div>

    <button class="close-btn" onclick="window.close(); history.back();">إغلاق</button>
    <div class="auto-close" id="auto-close-text">سيُغلق تلقائياً خلال <span id="auto-countdown">5</span> ثواني</div>
  </div>

  <!-- حالة: كود منتهي -->
  <div class="state" id="state-expired">
    <div class="icon-wrap error">
      <svg class="xmark" viewBox="0 0 32 32">
        <line x1="8" y1="8" x2="24" y2="24"/>
        <line x1="24" y1="8" x2="8" y2="24"/>
      </svg>
    </div>
    <div class="main-text red">كود منتهي الصلاحية</div>
    <div class="sub-text">الكود تجاوز مدة الصلاحية<br>امسح الـ QR مجدداً</div>
    <button class="close-btn" onclick="window.close(); history.back();">إغلاق</button>
  </div>

  <!-- حالة: خطأ -->
  <div class="state" id="state-error">
    <div class="icon-wrap error">
      <svg class="xmark" viewBox="0 0 32 32">
        <line x1="8" y1="8" x2="24" y2="24"/>
        <line x1="24" y1="8" x2="8" y2="24"/>
      </svg>
    </div>
    <div class="main-text red">حدث خطأ</div>
    <div class="sub-text" id="error-msg">تعذّر تسجيل الحضور</div>
    <button class="close-btn" onclick="window.close(); history.back();">إغلاق</button>
  </div>

</div>

<script>
const SECRET_KEY = 'ATTENDANCE_2024_SECRET';
const REFRESH_INTERVAL = 5;

function showState(id) {
  document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function verifyCode(code, ts) {
  const timestamp = parseInt(ts);
  const now = Math.floor(Date.now() / 1000);
  if (Math.abs(now - timestamp) > 15) return false;
  const timeSlot = Math.floor(timestamp / REFRESH_INTERVAL);
  const raw = `${timeSlot}:${SECRET_KEY}`;
  const encoded = btoa(raw).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const expected = encoded.substring(0, 32);
  const prevSlot = timeSlot - 1;
  const rawPrev = `${prevSlot}:${SECRET_KEY}`;
  const encPrev = btoa(rawPrev).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_').substring(0,32);
  return code === expected || code === encPrev;
}

function getDeviceName(deviceId) {
  try {
    const devices = JSON.parse(localStorage.getItem('attendance_devices') || '{}');
    return devices[deviceId]?.name || deviceId;
  } catch(e) {
    return deviceId;
  }
}

function saveRecord(record) {
  try {
    const records = JSON.parse(localStorage.getItem('attendance_records') || '[]');
    records.unshift(record);
    localStorage.setItem('attendance_records', JSON.stringify(records));

    // تحديث بيانات الجهاز
    const devices = JSON.parse(localStorage.getItem('attendance_devices') || '{}');
    if (!devices[record.deviceId]) {
      devices[record.deviceId] = {
        id: record.deviceId,
        name: record.deviceId,
        firstSeen: new Date().toISOString(),
        scans: 0
      };
    }
    devices[record.deviceId].lastSeen = new Date().toISOString();
    devices[record.deviceId].scans = (devices[record.deviceId].scans || 0) + 1;
    localStorage.setItem('attendance_devices', JSON.stringify(devices));
  } catch(e) {}
}

function startAutoClose(seconds) {
  let s = seconds;
  const el = document.getElementById('auto-countdown');
  const interval = setInterval(() => {
    s--;
    if (el) el.textContent = s;
    if (s <= 0) {
      clearInterval(interval);
      window.close();
      history.back();
    }
  }, 1000);
}

// =============================================
// الكود الرئيسي
// =============================================
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const ts = params.get('ts');
const deviceId = params.get('device') || ('device-' + Math.random().toString(36).substr(2,6));
const type = params.get('type') || 'in';

setTimeout(() => {
  if (!code || !ts) {
    document.getElementById('error-msg').textContent = 'رابط غير صحيح — لا توجد بيانات';
    showState('state-error');
    return;
  }

  const valid = verifyCode(code, ts);
  if (!valid) {
    showState('state-expired');
    return;
  }

  // تسجيل الحضور
  const now = new Date();
  const displayName = getDeviceName(deviceId);
  const timeStr = now.toLocaleTimeString('ar-SA', { hour12: false });
  const dateStr = now.toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' });

  const record = {
    id: Date.now(),
    deviceId,
    displayName,
    type,
    time: timeStr,
    date: dateStr,
    timestamp: now.getTime(),
    codeValid: true
  };

  saveRecord(record);

  // عرض النتيجة
  document.getElementById('info-name').textContent = displayName;
  document.getElementById('info-time').textContent = timeStr;
  document.getElementById('info-date').textContent = dateStr;
  document.getElementById('info-type').innerHTML =
    type === 'in'
      ? '<span class="badge in">↑ حضور</span>'
      : '<span class="badge out">↓ انصراف</span>';
  document.getElementById('success-sub').textContent =
    type === 'in' ? 'تم تسجيل حضورك بنجاح' : 'تم تسجيل انصرافك بنجاح';

  showState('state-success');
  startAutoClose(5);

}, 800);
</script>
</body>
</html>

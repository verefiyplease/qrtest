<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الحضور - شاشة العرض</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Grid background like Apple Watch */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .header {
    text-align: center;
    letter-spacing: 0.2em;
  }

  .header .title {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.35em;
    margin-bottom: 6px;
  }

  .header .subtitle {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.2em;
  }

  /* QR Card - Apple Watch style */
  .qr-card {
    position: relative;
    width: 260px;
    height: 260px;
  }

  /* Animated corner brackets */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: rgba(255,255,255,0.8);
    border-style: solid;
    z-index: 3;
  }
  .corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  /* Scan line animation */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    z-index: 4;
    animation: scan 3s linear infinite;
    opacity: 0;
  }

  @keyframes scan {
    0% { top: 0; opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .qr-wrapper {
    width: 260px;
    height: 260px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: opacity 0.3s ease;
  }

  .qr-wrapper.refreshing {
    opacity: 0;
  }

  #qrcode {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #qrcode canvas, #qrcode img {
    display: block;
  }

  /* Timer ring */
  .timer-ring {
    position: relative;
    width: 64px;
    height: 64px;
  }

  .timer-ring svg {
    transform: rotate(-90deg);
  }

  .timer-bg {
    fill: none;
    stroke: rgba(255,255,255,0.1);
    stroke-width: 3;
  }

  .timer-progress {
    fill: none;
    stroke: #fff;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 175.9;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }

  .timer-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0;
  }

  /* Clock display */
  .clock {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    text-align: center;
  }

  .clock .time-big {
    font-size: 32px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 4px;
  }

  .clock .date-small {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.2em;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.15em;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .code-display {
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.3em;
    text-align: center;
    max-width: 260px;
    word-break: break-all;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Particles */
  .particle {
    position: fixed;
    width: 1px;
    height: 1px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    pointer-events: none;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">نظام الحضور والانصراف</div>
    <div class="subtitle">ATTENDANCE SYSTEM — ACTIVE</div>
  </div>

  <div class="clock">
    <span class="time-big" id="clock-time">00:00:00</span>
    <span class="date-small" id="clock-date">—</span>
  </div>

  <div class="qr-card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line"></div>
    <div class="qr-wrapper" id="qrWrapper">
      <div id="qrcode"></div>
    </div>
  </div>

  <div class="timer-ring">
    <svg width="64" height="64" viewBox="0 0 64 64">
      <circle class="timer-bg" cx="32" cy="32" r="28"/>
      <circle class="timer-progress" id="timerProgress" cx="32" cy="32" r="28"/>
    </svg>
    <div class="timer-number" id="timerNumber">5</div>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    <span>جاهز للمسح — SCAN READY</span>
  </div>

  <div class="code-display" id="codeDisplay">جاري التوليد...</div>
</div>

<script>
// =============================================
// CONFIG — غيّر هذه القيم حسب مشروعك
// =============================================
const CONFIG = {
  // رابط صفحة تسجيل الحضور (ستحتاج لرفعها على سيرفر)
  BASE_URL: window.location.origin + '/attend',
  // مفتاح سري للتشفير (يجب أن يكون نفسه في ملف Dashboard)
  SECRET_KEY: 'ATTENDANCE_2024_SECRET',
  // مدة صلاحية الكود (ثواني)
  CODE_VALIDITY: 10,
  // وقت تغيير الكود (ثواني)
  REFRESH_INTERVAL: 5,
};

let qrInstance = null;
let countdown = CONFIG.REFRESH_INTERVAL;
const circumference = 2 * Math.PI * 28;

// توليد كود مؤمّن
function generateCode() {
  const timestamp = Math.floor(Date.now() / 1000);
  // نقسّم على 5 لنضمن أن الكود ثابت لمدة 5 ثواني
  const timeSlot = Math.floor(timestamp / CONFIG.REFRESH_INTERVAL);
  const raw = `${timeSlot}:${CONFIG.SECRET_KEY}`;
  // تشفير بسيط (Base64 + تعديل)
  const encoded = btoa(raw).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
  return `${encoded.substring(0, 32)}`;
}

function getQRData() {
  const code = generateCode();
  const ts = Math.floor(Date.now() / 1000);
  // الرابط الذي سيفتحه الآيفون عند مسح الكود
  return `${CONFIG.BASE_URL}?code=${code}&ts=${ts}`;
}

function updateQR() {
  const wrapper = document.getElementById('qrWrapper');
  wrapper.classList.add('refreshing');

  setTimeout(() => {
    const container = document.getElementById('qrcode');
    container.innerHTML = '';

    const data = getQRData();
    const code = generateCode();

    new QRCode(container, {
      text: data,
      width: 230,
      height: 230,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    document.getElementById('codeDisplay').textContent = code.substring(0, 16) + '...';
    wrapper.classList.remove('refreshing');
  }, 300);
}

// ساعة حية
function updateClock() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ar-SA', { hour12: false });
  const dateStr = now.toLocaleDateString('ar-SA', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  document.getElementById('clock-time').textContent = timeStr;
  document.getElementById('clock-date').textContent = dateStr;
}

// مؤقت عدّ تنازلي
function updateTimer() {
  const progress = document.getElementById('timerProgress');
  const number = document.getElementById('timerNumber');

  countdown--;
  if (countdown <= 0) {
    countdown = CONFIG.REFRESH_INTERVAL;
    updateQR();
  }

  const offset = circumference * (1 - countdown / CONFIG.REFRESH_INTERVAL);
  progress.style.strokeDashoffset = offset;
  number.textContent = countdown;

  // تلوين حسب الوقت المتبقي
  if (countdown <= 2) {
    progress.style.stroke = 'rgba(255,255,255,0.4)';
  } else {
    progress.style.stroke = '#fff';
  }
}

// جسيمات الخلفية
function createParticles() {
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${Math.random() * 2 + 1}px;
      height: ${Math.random() * 2 + 1}px;
      animation-duration: ${Math.random() * 15 + 10}s;
      animation-delay: ${Math.random() * 10}s;
      --drift: ${(Math.random() - 0.5) * 100}px;
    `;
    document.body.appendChild(p);
  }
}

// تهيئة
updateQR();
updateClock();
createParticles();

setInterval(updateTimer, 1000);
setInterval(updateClock, 1000);
</script>
</body>
</html>
